function classify(n,u){const nm=(n||"").toLowerCase().replace(/[^a-z\u00e7\u011f\u0131\u00f6\u015f\u00fc ]/g," ").trim();const un=(u||"").toLowerCase();if(bizWords.some(w=>(nm+" "+un).includes(w)))return"business";const f=nm.split(/\s+/)[0];if(maleNames.has(f))return"male";if(femaleNames.has(f))return"female";return"unknown"}

function analyzeData(j){
  let fg=[],fr=[];
  if(j.followingWithNames)fg=j.followingWithNames.map(x=>({u:x.u,n:x.n}));
  else if(j.relationships_following)fg=j.relationships_following.map(x=>({u:x.string_list_data?.[0]?.value||"",n:""}));
  if(j.fmnfb&&j.ifnfm&&j.mutual){
    if(!j.followingWithNames)fg=[...j.ifnfm,...j.mutual].map(u=>({u,n:""}));
    fr=[...j.fmnfb,...j.mutual].map(u=>({u,n:""}));
  }
  if(j.relationships_followers)fr=j.relationships_followers.map(x=>({u:x.string_list_data?.[0]?.value||"",n:""}));
  const fgS=new Set(fg.map(x=>x.u)),frS=new Set(fr.map(x=>x.u));
  const fmnfb=fr.filter(x=>!fgS.has(x.u)).map(x=>x.u);
  const ifnfm=fg.filter(x=>!frS.has(x.u)).map(x=>x.u);
  const mutual=fg.filter(x=>frS.has(x.u)).map(x=>x.u);
  const g={male:0,female:0,business:0,unknown:0};
  fg.forEach(x=>{g[classify(x.n,x.u)]++});
  return{totalFollowers:fr.length,totalFollowing:fg.length,mutual:mutual.length,fmnfbCount:fmnfb.length,ifnfmCount:ifnfm.length,fmnfbList:fmnfb,ifnfmList:ifnfm,mutualList:mutual,gender:g}
}

function DonutChart({data,size=220}){
  const total=data.reduce((s,d)=>s+d.value,0);
  const cx=size/2,cy=size/2,r=size*0.35,rI=size*0.22;
  let sa=-90;
  const paths=data.filter(d=>d.value>0).map((d,i)=>{
    const ang=(d.value/total)*360;const ea=sa+ang;const la=ang>180?1:0;
    const s1=sa*Math.PI/180,e1=ea*Math.PI/180;
    const path=`M${cx+r*Math.cos(s1)} ${cy+r*Math.sin(s1)} A${r} ${r} 0 ${la} 1 ${cx+r*Math.cos(e1)} ${cy+r*Math.sin(e1)} L${cx+rI*Math.cos(e1)} ${cy+rI*Math.sin(e1)} A${rI} ${rI} 0 ${la} 0 ${cx+rI*Math.cos(s1)} ${cy+rI*Math.sin(s1)} Z`;
    const mid=(sa+ang/2)*Math.PI/180;const lr=(r+rI)/2;const pct=((d.value/total)*100).toFixed(0);
    sa=ea;
    return e("g",{key:i},e("path",{d:path,fill:d.color}),ang>15&&e("text",{x:cx+lr*Math.cos(mid),y:cy+lr*Math.sin(mid),textAnchor:"middle",dominantBaseline:"central",fill:"#fff",fontSize:11,fontWeight:"bold"},pct+"%"));
  });
  return e("div",{className:"flex flex-col items-center"},
    e("svg",{width:size,height:size,viewBox:`0 0 ${size} ${size}`},paths),
    e("div",{className:"flex flex-wrap justify-center gap-3 mt-3"},data.filter(d=>d.value>0).map((d,i)=>e("div",{key:i,className:"flex items-center gap-1.5 text-xs text-gray-600"},e("div",{style:{width:10,height:10,borderRadius:3,background:d.color}}),e("span",null,d.name))))
  )
}
function HBarChart({data,width=400,height=200}){
  const max=Math.max(...data.map(d=>d.count));const leftPad=65;const barH=Math.min(30,height/(data.length*1.5));

    data.map((d,i)=>{const y=20+i*(barH+12);const w=max>0?((d.count/max)*(width-leftPad-20)):0;
      return e("g",{key:i},e("text",{x:leftPad-8,y:y+barH/2,textAnchor:"end",dominantBaseline:"central",fontSize:11,fill:"#666"},d.name),e("rect",{x:leftPad,y,width:w,height:barH,rx:4,fill:d.fill}),e("text",{x:leftPad+w+6,y:y+barH/2,dominantBaseline:"central",fontSize:11,fill:"#666"},d.count.toLocaleString("tr-TR")))})

}

    if(!igUser){setErr("Instagram kullanici adini girin");return}
    if(!igPass){setErr("Instagram sifresini girin");return}

      // Backend'e Instagram analiz istegi

      onData(d.data);
    }catch(ex){
      // Backend basarisiz olursa simule et (demo)

        setStatus(steps[i]);setProgress(Math.round(((i+1)/steps.length)*100));

/* ══════════ MAIN APP ══════════ */
function App(){
  const[page,setPage]=useState("login");
  const[user,setUser]=useState(null);
  const[data,setData]=useState(null);

  const logout=()=>{_token=null;setUser(null);setData(null);setPage("login")};

  if(page==="login")return e(LoginPage,{onLogin:u=>{setUser(u);setPage("connect")},onGo:setPage});
  if(page==="register")return e(RegisterPage,{onRegister:u=>{setUser(u);setPage("connect")},onGo:setPage});
  if(page==="connect")return e(ConnectPage,{user,onData:d=>{setData(d);setPage("dashboard")},onGo:setPage,onLogout:logout});
  if(page==="dashboard"&&data)return e(Dashboard,{user,data,onNew:()=>setPage("connect"),onLogout:logout});
  return null;
}

ReactDOM.render(e(App),document.getElementById("root"));
</script>
